                <!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>FAKE YT TECH - Admin Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6">
    <div id="login-box" class="max-w-md mx-auto mt-20 p-8 border border-white/10 rounded-3xl bg-white/5">
        <h2 class="text-center text-2xl font-bold mb-6 text-cyan-400 italic">ADMIN MASTER</h2>
        <input id="pass" type="password" placeholder="Password" class="w-full p-4 mb-4 rounded-xl bg-black text-white border border-white/20 outline-none focus:border-cyan-500">
        <button onclick="checkPass()" class="w-full bg-cyan-500 p-4 rounded-xl text-black font-black">ENTRE NAN SISTÈM</button>
    </div>

    <div id="dash" class="hidden max-w-lg mx-auto">
        <h1 class="text-3xl font-black text-cyan-400 mb-6 italic text-center uppercase">Key Generator</h1>
        <div class="bg-white/5 p-8 rounded-[40px] border border-white/10 backdrop-blur-xl shadow-2xl">
            <label class="block text-xs text-gray-500 mb-2 font-bold uppercase tracking-widest">Durasyon Plan an</label>
            <select id="days" class="w-full p-4 mb-6 rounded-2xl bg-black border border-white/10 text-cyan-400 font-bold outline-none">
                <option value="1">1 Jou Access</option>
                <option value="7">7 Jou Access</option>
                <option value="30">30 Jou Access</option>
            </select>
            
            <button onclick="generateKey()" class="w-full bg-cyan-500 hover:bg-cyan-400 p-5 rounded-2xl text-black font-black uppercase tracking-widest transition-all">
                Kreye Kle Sekirize
            </button>
            
            <div id="result" class="mt-8 p-6 bg-black/60 rounded-3xl border border-dashed border-cyan-500/50 hidden">
                <p class="text-[10px] text-center text-gray-500 uppercase mb-2">Kopye kle sa a bay kliyan an:</p>
                <div class="flex items-center gap-2">
                    <code id="key-display" class="flex-1 text-xl font-mono text-cyan-300 text-center font-bold"></code>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PWOTOKÒL SEKIRITE: Sèl sa a dwe menm jan ak pa Users la
        const SECURITY_SALT = "FAKE_YT_2026_MASTER_SECRET";

        function checkPass() {
            if(document.getElementById('pass').value === 'admin') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
            } else { alert("Mdp enkòrèk!"); }
        }

        function generateKey() {
            const d = document.getElementById('days').value;
            const now = Math.floor(Date.now() / 1000);
            
            // Nou kreye yon "Signature" matematik
            const rawData = SECURITY_SALT + d + "VALID";
            const signature = btoa(rawData).substring(2, 10).toUpperCase();
            
            // Fòma kle: FAKE - JOU - SIGNATURE
            const finalKey = `FAKE-${d}D-${signature}`;
            
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('key-display').innerText = finalKey;
        }
    </script>
</body>
</html>
