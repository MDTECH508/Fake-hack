<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake YT Tech - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .btn-generate {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            transition: 0.3s;
        }
        .btn-generate:hover {
            box-shadow: 0 0 25px #8b5cf6;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
                    FAKE YT TECH ADMIN
                </h1>
                <p class="text-gray-400 text-sm">Panel Jesyon Kle VPN</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Panel Jenerasyon -->
            <div class="glass-card p-6 border-purple-500/30 lg:col-span-1 h-fit">
                <h2 class="text-lg font-bold mb-4">⚡ Jenere Kle FAKE</h2>
                
                <div class="mb-4">
                    <label class="block text-xs text-gray-400 mb-2 font-bold uppercase">Chwazi Durasyon</label>
                    <select id="duration" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl outline-none focus:border-purple-500">
                        <option value="1">1 Jou</option>
                        <option value="7">7 Jou</option>
                        <option value="30">30 Jou</option>
                    </select>
                </div>

                <button onclick="generateKey()" class="btn-generate w-full py-4 rounded-xl font-black uppercase text-sm tracking-widest mb-4">
                    Generate Key
                </button>
                <div id="last-key" class="text-center font-mono text-purple-400 font-bold bg-purple-500/10 p-2 rounded hidden"></div>
            </div>

            <!-- Jesyon Lis Kle -->
            <div class="glass-card p-6 lg:col-span-2">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                    <h2 class="text-lg font-bold italic underline">Lis Kle yo</h2>
                    <div class="flex gap-2 bg-white/5 p-1 rounded-lg border border-white/10">
                        <button onclick="renderKeys('all')" class="px-3 py-1 text-xs rounded-md hover:bg-white/10">Tout</button>
                        <button onclick="renderKeys('active')" class="px-3 py-1 text-xs text-green-400 rounded-md hover:bg-green-500/10">Aktif</button>
                        <button onclick="renderKeys('expired')" class="px-3 py-1 text-xs text-red-400 rounded-md hover:bg-red-500/10">Ekspire</button>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-xs uppercase text-gray-500 border-b border-white/10">
                                <th class="pb-3 px-2 text-purple-400">Kle (FAKE)</th>
                                <th class="pb-3 px-2">Estati</th>
                                <th class="pb-3 px-2">Limit Jou</th>
                                <th class="pb-3 px-2 text-right">Aksyon</th>
                            </tr>
                        </thead>
                        <tbody id="key-list" class="text-sm">
                            <!-- Kle yo ap parèt isit la -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        let database = [];

        function generateKey() {
            const days = document.getElementById('duration').value;
            
            // Kreye kle fòma FAKE-XXXX-XXXX
            const p1 = Math.random().toString(36).substring(2, 6).toUpperCase();
            const p2 = Math.random().toString(36).substring(2, 6).toUpperCase();
            const keyName = `FAKE-${p1}-${p2}`;
            
            // Kalkile dat ekspirasyon
            const exp = new Date();
            exp.setDate(exp.getDate() + parseInt(days));

            const newKey = {
                id: keyName,
                duration: days,
                expireDate: exp,
                status: 'active'
            };

            database.push(newKey);
            
            // Afiche dènye kle a an gwo
            const lastBox = document.getElementById('last-key');
            lastBox.textContent = keyName;
            lastBox.classList.remove('hidden');
            
            renderKeys();
        }

        function renderKeys(filter = 'all') {
            const list = document.getElementById('key-list');
            list.innerHTML = "";
            const kounya = new Date();

            database.forEach(key => {
                const isExpired = kounya > key.expireDate;
                
                // Filtre yo
                if(filter === 'active' && isExpired) return;
                if(filter === 'expired' && !isExpired) return;

                const row = document.createElement('tr');
                row.className = "border-b border-white/5 hover:bg-white/5 transition";
                
                const statusHtml = isExpired 
                    ? `<span class="bg-red-500/20 text-red-400 px-2 py-0.5 rounded text-[10px] border border-red-500/30">EXPIRE</span>`
                    : `<span class="bg-green-500/20 text-green-400 px-2 py-0.5 rounded text-[10px] border border-green-500/30">AKTIF</span>`;

                row.innerHTML = `
                    <td class="py-4 px-2 font-mono font-black">${key.id}</td>
                    <td class="py-4 px-2">${statusHtml}</td>
                    <td class="py-4 px-2 text-gray-400 text-xs">${key.duration} Jou</td>
                    <td class="py-4 px-2 text-right">
                        <button onclick="copy('${key.id}')" class="text-xs bg-white/10 px-3 py-1 rounded hover:bg-white/20 transition">Copy</button>
                        <button onclick="remove('${key.id}')" class="ml-2 text-red-500">🗑️</button>
                    </td>
                `;
                list.prepend(row);
            });
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("Kopye nan clipboard: " + text);
        }

        function remove(id) {
            database = database.filter(k => k.id !== id);
            renderKeys();
        }
    </script>
</body>
</html>
